openapi: 3.0.3
info:
  title: CloudX VDI Platform API - Admin Portal
  description: CloudX VDI 플랫폼 관리자 포털 API (resource + operation)
  version: v2.2.10
servers:
  - url: http://127.0.0.1:3000/api
    description: Mock Server (local)
security:
  - bearerAuth: []
paths:
  /v1/resource/vpcs/group:
    get:
      tags:
        - resource/vpcs
      summary: VPC 그룹 목록 조회
      parameters:
        - name: page
          in: query
          schema:
            type: number
          description: 페이지 번호
        - name: limit
          in: query
          schema:
            type: number
          description: 페이지당 항목 수
        - name: vm_grp_nm
          in: query
          schema:
            type: string
          description: 그룹명 검색어
        - name: tnt_id
          in: query
          schema:
            type: string
          description: 테넌트 ID 필터
      responses:
        "200":
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpcGroupListResponse"
    post:
      tags:
        - resource/vpcs
      summary: VPC 그룹 등록
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VpcGroupCreateRequest"
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/group/{id}:
    get:
      tags:
        - resource/vpcs
      summary: VPC 그룹 상세 조회
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: 그룹 ID
      responses:
        "200":
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpcGroupDetailResponse"
  /v1/resource/vpcs/group/{vmGrpId}:
    put:
      tags:
        - resource/vpcs
      summary: VPC 그룹 수정
      parameters:
        - name: vmGrpId
          in: path
          required: true
          schema:
            type: string
          description: 그룹 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VpcGroupUpdateRequest"
      responses:
        "200":
          description: 정상 처리
    delete:
      tags:
        - resource/vpcs
      summary: VPC 그룹 삭제
      parameters:
        - name: vmGrpId
          in: path
          required: true
          schema:
            type: string
          description: 그룹 ID
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/group/{vmGrpId}/network:
    post:
      tags:
        - resource/vpcs
      summary: VPC 그룹 네트워크 등록
      parameters:
        - name: vmGrpId
          in: path
          required: true
          schema:
            type: string
          description: 그룹 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VpcGroupNetworkCreateRequest"
      responses:
        "200":
          description: 정상 처리
    delete:
      tags:
        - resource/vpcs
      summary: VPC 그룹 네트워크 삭제
      parameters:
        - name: vmGrpId
          in: path
          required: true
          schema:
            type: string
          description: 그룹 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VpcGroupNetworkDeleteRequest"
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/pool:
    get:
      tags:
        - resource/vpcs
      summary: VPC 풀 목록 조회
      parameters:
        - name: vm_grp_id
          in: query
          schema:
            type: string
          description: 그룹 ID 필터
        - name: tnt_mtd_cd
          in: query
          schema:
            type: string
          description: 테넌트 방식 코드 (전용/공용 구분)
        - name: gdn_img_cre_yn
          in: query
          schema:
            type: string
          description: 골든이미지 생성 여부 (Y/N)
        - name: page
          in: query
          schema:
            type: number
          description: 페이지 번호
        - name: limit
          in: query
          schema:
            type: number
          description: 페이지당 항목 수
      responses:
        "200":
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpcPoolListResponse"
    post:
      tags:
        - resource/vpcs
      summary: VPC 풀 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VpcPoolCreateRequest"
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/pool/count:
    get:
      tags:
        - resource/vpcs
      summary: VPC 풀 카운트 조회
      parameters:
        - name: vm_grp_id
          in: query
          schema:
            type: string
          description: 그룹 ID
      responses:
        "200":
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpcPoolCountResponse"
  /v1/resource/vpcs/pool/auto/{companyNm}:
    get:
      tags:
        - resource/tenants
      summary: 회사명 기준 자동 Pool 조회
      parameters:
        - name: companyNm
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 성공
  /v1/resource/vpcs/pool/{vmPoolId}:
    get:
      tags:
        - resource/vpcs
      summary: VPC 풀 상세 조회
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      responses:
        "200":
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpcPoolDetailResponse"
    put:
      tags:
        - resource/vpcs
      summary: VPC 풀 수정
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VpcPoolUpdateRequest"
      responses:
        "200":
          description: 정상 처리
    delete:
      tags:
        - resource/vpcs
      summary: VPC 풀 삭제
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/pool/{poolId}/subnet:
    post:
      tags:
        - resource/vpcs
      summary: 풀 서브넷 등록(수정)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoolSubnetRequest"
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/pool/{vmPoolId}/subnet:
    put:
      tags:
        - resource/vpcs
      summary: 풀 서브넷 수정
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoolSubnetRequest"
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/pool/{vmPoolId}/reset:
    put:
      tags:
        - resource/vpcs
      summary: 풀 초기화
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/pool/{vmPoolId}/template:
    put:
      tags:
        - resource/vpcs
      summary: 풀 템플릿 변경
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoolTemplateChangeRequest"
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/pool/{id}/image-mismatched-vm:
    get:
      tags:
        - resource/vpcs
      summary: 이미지 불일치 VM 목록 조회
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      responses:
        "200":
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageMismatchedVmListResponse"
  /v1/resource/vpcs/pool/{vmPoolId}/volume:
    post:
      tags:
        - resource/vpcs
      summary: 풀 볼륨 등록
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PoolVolumeRequest"
      responses:
        "200":
          description: 정상 처리
    delete:
      tags:
        - resource/vpcs
      summary: 풀 볼륨 해제
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
        - name: volm_typ_id
          in: query
          schema:
            type: string
          description: 볼륨 타입 ID
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/pool/{vmPoolId}/ip:
    get:
      tags:
        - resource/vpcs
      summary: 풀 IP 목록 조회
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      responses:
        "200":
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoolIpListResponse"
  /v1/resource/vpcs/pool/{vmPoolId}/collection:
    delete:
      tags:
        - resource/vpcs
      summary: 자원 회수 (리소스 반납)
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/pool2:
    get:
      tags:
        - resource/vpcs
      summary: VPC 풀 목록 조회 (v2)
      parameters:
        - name: page
          in: query
          schema:
            type: number
          description: 페이지 번호
        - name: limit
          in: query
          schema:
            type: number
          description: 페이지당 항목 수
      responses:
        "200":
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VpcPoolListResponse"
  /v1/resource/vpcs/resources:
    get:
      tags:
        - resource/vm-authorization
      summary: VM 인증(사용자-VM 매핑) 목록 조회
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: tnt_id
          in: query
          schema:
            type: string
        - name: vm_pool_id
          in: query
          schema:
            type: string
        - name: vm_grp_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VmAuthItem"
  /v1/resource/vpcs/resources/list/vm2:
    get:
      tags:
        - resource/vpcs
      summary: VPC 리소스 목록 조회 (v2, 그룹별)
      parameters:
        - name: page
          in: query
          schema:
            type: number
          description: 페이지 번호
        - name: limit
          in: query
          schema:
            type: number
          description: 페이지당 항목 수
        - name: vm_grp_id
          in: query
          schema:
            type: array
            items:
              type: string
          description: "그룹 ID (배열, arrayFormat: repeat)"
        - name: tnt_id
          in: query
          schema:
            type: string
          description: 테넌트 ID
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/list/vm2/count:
    get:
      tags:
        - resource/vpcs
      summary: VPC 리소스 카운트 조회
      parameters:
        - name: vm_grp_id
          in: query
          schema:
            type: string
          description: 그룹 ID
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/vm_assign:
    post:
      tags:
        - resource/vpcs
      summary: VM 유동 IP 개별 할당
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VmAssignRequest"
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/vm_appoint_assign:
    post:
      tags:
        - resource/vpcs
      summary: VM 고정 IP 개별 할당
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VmAppointAssignRequest"
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/vm_bundle_assign:
    post:
      tags:
        - resource/vpcs
      summary: VM 일괄 할당
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VmBundleAssignRequest"
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/vm_scaleup:
    post:
      tags:
        - resource/vpcs
      summary: VM 자원 증설 (사양 업그레이드)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VmScaleUpRequest"
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/vm_scaleout:
    post:
      tags:
        - resource/vpcs
      summary: VM 스케일아웃 (골든이미지 생성용 VM 생성)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VmScaleOutRequest"
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/vm_bundle_secu_plcy:
    post:
      tags:
        - resource/vpcs
      summary: VM 보안 정책 일괄 적용
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VmBundleSecuPlcyRequest"
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/vnc_conn:
    post:
      tags:
        - resource/vpcs
      summary: VNC 연결
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VncConnRequest"
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/vnc_disconn:
    post:
      tags:
        - resource/vpcs
      summary: VNC 연결 해제
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VncDisconnRequest"
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/pooled/user_vm:
    get:
      tags:
        - resource/vpcs
      summary: 공용 PC 대기 자원 목록 조회
      parameters:
        - name: vm_pool_id
          in: query
          schema:
            type: string
          description: 풀 ID 필터
        - name: page
          in: query
          schema:
            type: number
          description: 페이지 번호
        - name: limit
          in: query
          schema:
            type: number
          description: 페이지당 항목 수
      responses:
        "200":
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PooledUserVmListResponse"
  /v1/resource/vpcs/resources/pooled/usr_vm:
    delete:
      tags:
        - resource/vpcs
      summary: 공용 PC 대기 자원 삭제
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PooledUserVmDeleteRequest"
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/{id}:
    get:
      tags:
        - resource/vpcs
      summary: VM 상세 조회
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: VM 인증 ID (vm_auth_id)
      responses:
        "200":
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VmDetailResponse"
  /v1/resource/vpcs/resources/{vmAuthId}:
    put:
      tags:
        - resource/vpcs
      summary: VM 정보 수정
      parameters:
        - name: vmAuthId
          in: path
          required: true
          schema:
            type: string
          description: VM 인증 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: 수정할 필드 포함 form 객체
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/{vmAuthId}/tenant:
    put:
      tags:
        - resource/vpcs
      summary: VM 테넌트 정보 수정
      parameters:
        - name: vmAuthId
          in: path
          required: true
          schema:
            type: string
          description: VM 인증 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VmTenantUpdateRequest"
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/{vmAuthId}/ip:
    put:
      tags:
        - resource/vpcs
      summary: VM IP 변경
      parameters:
        - name: vmAuthId
          in: path
          required: true
          schema:
            type: string
          description: VM 인증 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VmIpChangeRequest"
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/{vmAuthId}/start:
    post:
      tags:
        - resource/vpcs
      summary: VM 시작
      parameters:
        - name: vmAuthId
          in: path
          required: true
          schema:
            type: string
          description: VM 인증 ID
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/{vmAuthId}/stop:
    post:
      tags:
        - resource/vpcs
      summary: VM 중지
      parameters:
        - name: vmAuthId
          in: path
          required: true
          schema:
            type: string
          description: VM 인증 ID
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/{vmAuthId}/restart:
    post:
      tags:
        - resource/vpcs
      summary: VM 재시작
      parameters:
        - name: vmAuthId
          in: path
          required: true
          schema:
            type: string
          description: VM 인증 ID
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/{vmAuthId}/recovery:
    post:
      tags:
        - resource/vpcs
      summary: VM 복구 (초기화 - 할당 VM)
      parameters:
        - name: vmAuthId
          in: path
          required: true
          schema:
            type: string
          description: VM 인증 ID
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: 복구 옵션
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/{vmAuthId}/initial:
    post:
      tags:
        - resource/vpcs
      summary: VM 초기화 (미할당 VM)
      parameters:
        - name: vmAuthId
          in: path
          required: true
          schema:
            type: string
          description: VM 인증 ID
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/{vmAuthId}/upgrade:
    post:
      tags:
        - resource/vpcs
      summary: VM 업그레이드 (사양 변경 후 적용)
      parameters:
        - name: vmAuthId
          in: path
          required: true
          schema:
            type: string
          description: VM 인증 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VmUpgradeRequest"
      responses:
        "200":
          description: 정상 처리
  /v1/resource/vpcs/resources/{vmAuthId}/vm_terminate:
    post:
      tags:
        - resource/vpcs
