components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        errCode:
          type: string
          description: 오류 코드
        errMsg:
          type: string
          description: 오류 메시지

    ResultMessageResponse:
      type: object
      properties:
        result_message:
          type: string
          description: 처리 결과 메시지

    AuthPasswordVerifyRequest:
      type: object
      required:
        - acct_conn_id
        - passwd
        - tnt_url_id
      properties:
        acct_conn_id:
          type: string
          description: 사용자 아이디
        passwd:
          type: string
          description: 현재 비밀번호
        tnt_url_id:
          type: string
          description: 테넌트 URL ID

    ChangePasswordRequest:
      type: object
      required:
        - acct_conn_id
        - passwd
        - new_passwd
        - new_passwd_confirm
      properties:
        acct_conn_id:
          type: string
          description: 사용자 아이디
        passwd:
          type: string
          description: 현재(초기/임시) 비밀번호
        new_passwd:
          type: string
          description: 새 비밀번호
        new_passwd_confirm:
          type: string
          description: 새 비밀번호 확인

    GwLoginRequest:
      type: object
      required:
        - acct_conn_id
        - passwd
        - tnt_url_id
      properties:
        acct_conn_id:
          type: string
          description: 사용자 아이디
        passwd:
          type: string
          description: 비밀번호 (최대 32자)
          maxLength: 32
        tnt_url_id:
          type: string
          description: 테넌트 URL ID

    GwLoginResponse:
      type: object
      properties:
        challenge_id:
          type: string
          description: 2차 인증용 챌린지 ID
        acct_sts_cd:
          type: string
          description: "계정 상태 코드 (U013NR: 정상, U013SL: 휴면, U013IN: 초기화)"
        acct_2nd_cert_tgt_yn:
          type: string
          description: "2차 인증 대상 여부 (Y/N)"
        n2nd_cert_typ_cd:
          type: string
          description: "2차 인증 수단 코드 (U004SMS, U004EML, U004OTP, U004KKT)"
        passwd_mdfy_tgt_yn:
          type: string
          description: "초기/임시 비밀번호 변경 필요 여부 (Y/N)"
        passwd_mdfy_vlid_yn:
          type: string
          description: "비밀번호 장기간 미변경 여부 (Y/N)"
        ad_itlk_acct_yn:
          type: string
          description: "AD 연동 계정 여부 (Y/N)"
        acct_conn_id:
          type: string
          description: 사용자 아이디
        acct_id:
          type: string
          description: 계정 내부 ID
        acct_nm:
          type: string
          description: 사용자 이름
        grp_typ_cd:
          type: string
          description: 그룹 유형 코드
        tnt_url_id:
          type: string
          description: 테넌트 URL ID
        error:
          type: object
          properties:
            comment:
              type: string
              description: 에러 메시지

    SecondCertSendRequest:
      type: object
      required:
        - acct_conn_id
        - n2nd_cert_typ_cd
        - tnt_url_id
        - challenge_id
      properties:
        acct_conn_id:
          type: string
          description: 사용자 아이디
        n2nd_cert_typ_cd:
          type: string
          description: "2차 인증 수단 코드 (U004SMS, U004EML, U004OTP, U004KKT)"
        tnt_url_id:
          type: string
          description: 테넌트 URL ID
        challenge_id:
          type: string
          description: 챌린지 ID

    FindAccountRequest:
      type: object
      required:
        - acct_nm
        - mob_no
        - portal_type
        - tnt_url_id
      properties:
        acct_nm:
          type: string
          description: 사용자 이름
