openapi: 3.0.3
info:
  title: CloudX VDI Platform API - User Portal
  description: CloudX VDI 플랫폼 사용자 포털 API
  version: v2.2.10
servers:
  - url: http://127.0.0.1:3001/api
    description: Mock Server (local)
security:
  - bearerAuth: []

tags:
  - name: auth/authentications
    description: 인증된 사용자 인증 API (비밀번호 검증/변경, 로그아웃)
  - name: gw/authentications
    description: 게이트웨이 경유 로그인 및 2차 인증 API
  - name: nauth/auth
    description: 비인증 인증 API (2차 인증 코드 발송, 아이디 찾기, 임시 비밀번호)
  - name: nauth/system
    description: 비인증 시스템 공개 API (설치파일, 공지, 팝업, UI, 날짜)
  - name: nauth/user
    description: 비인증 사용자 API (테넌트, VPN, Octatco)
  - name: resource/disk
    description: 개인 디스크(로컬) API
  - name: resource/snapshot
    description: 스냅샷 API
  - name: resource/vm-authorization
    description: VM 인가 API
  - name: resource/vpcs
    description: VPC 리소스 API
  - name: operation/cert
    description: 인증/보안 정책 API
  - name: user/accounts
    description: 계정 API
  - name: user/device-access
    description: 단말 접속 정보 API
  - name: user/servGroup
    description: 서비스 그룹 API
  - name: user/work
    description: 업무 요청 API
  - name: system/notices
    description: 공지사항 API
  - name: system/faqs
    description: FAQ API
  - name: system/qnas
    description: 1:1 문의 API
  - name: system/portals
    description: 포털 가이드 파일 API
  - name: fileService
    description: 파일 서비스 API

paths:
  /v1/auth/authentications/:
    post:
      tags:
        - auth/authentications
      summary: 비밀번호 확인
      description: 사용자 정보 페이지 진입 전 현재 비밀번호 검증
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthPasswordVerifyRequest'
      responses:
        '200':
          description: 비밀번호 검증 성공
        '400':
          description: 인증 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/auth/authentications/accounts/firstpassword:
    put:
      tags:
        - auth/authentications
      summary: 초기/임시 비밀번호 변경
      description: 최초 로그인 시 또는 임시 비밀번호 발급 후 비밀번호 변경
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: 비밀번호 변경 성공
        '400':
          description: 비밀번호 변경 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/auth/authentications/accounts/password:
    put:
      tags:
        - auth/authentications
      summary: 비밀번호 변경
      description: 로그인 후 마이페이지에서 비밀번호 변경
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: 비밀번호 변경 성공
        '400':
          description: 비밀번호 변경 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/logout:
    get:
      tags:
        - auth/authentications
      summary: 로그아웃
      description: 서버 세션 종료 및 클라이언트 토큰/사용자 정보 초기화
      responses:
        '200':
          description: 로그아웃 성공

  /v1/gw/authentications/:
    post:
      tags:
        - gw/authentications
      summary: 1차 로그인 인증
      description: 아이디/비밀번호 검증 후 2차 인증 여부 및 계정 상태 반환
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GwLoginRequest'
      responses:
        '200':
          description: 로그인 성공
          headers:
            Authorization:
              description: 인증 토큰
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GwLoginResponse'

  /v1/gw/authentications/2nd_cert/{tenant}/{acctConnId}/{challengeId}/{certNo}:
    post:
      tags:
        - gw/authentications
      summary: SMS/이메일/카카오톡 2차 인증 코드 검증
      description: SMS/이메일/카카오톡 2차 인증 코드 검증
      security: []
      parameters:
        - name: tenant
          in: path
          required: true
          schema:
            type: string
          description: 테넌트 URL ID
        - name: acctConnId
          in: path
          required: true
          schema:
            type: string
          description: 사용자 아이디
        - name: challengeId
          in: path
          required: true
          schema:
            type: string
          description: 챌린지 ID
        - name: certNo
          in: path
          required: true
          schema:
            type: string
          description: "사용자가 입력한 인증번호 (숫자 최대 6자리)"
      responses:
        '200':
          description: 인증 성공
          headers:
            Authorization:
              description: 인증 토큰
              schema:
                type: string
        '400':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/gw/authentications/2nd_cert/{tntUrlId}/{acctConnId}/{challengeId}/{otpNo}/totp:
    post:
      tags:
        - gw/authentications
      summary: OTP(TOTP) 2차 인증 코드 검증
      description: OTP 앱에서 생성한 인증번호 검증
      security: []
      parameters:
        - name: tntUrlId
          in: path
          required: true
          schema:
            type: string
          description: "테넌트 URL ID (없으면 'sovereignVDI' fallback)"
        - name: acctConnId
          in: path
          required: true
          schema:
            type: string
          description: 사용자 아이디
        - name: challengeId
          in: path
          required: true
          schema:
            type: string
          description: 챌린지 ID
        - name: otpNo
          in: path
          required: true
          schema:
            type: string
          description: "OTP 인증번호 (숫자 최대 6자리)"
      responses:
        '200':
          description: 인증 성공
          headers:
            Authorization:
              description: 인증 토큰
              schema:
                type: string
        '400':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/nauth/auth/authentications/2nd_cert:
    post:
      tags:
        - nauth/auth
      summary: 2차 인증 코드 발송 요청
      description: SMS/이메일/카카오톡/OTP QR코드를 사용자에게 발송
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SecondCertSendRequest'
      responses:
        '200':
          description: 발송 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultMessageResponse'
        '400':
          description: 발송 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/nauth/auth/authentications/accounts:
    post:
      tags:
        - nauth/auth
      summary: 아이디 찾기
      description: 이름과 휴대폰 번호로 등록된 아이디를 이메일로 발송
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FindAccountRequest'
      responses:
        '200':
          description: 아이디 발송 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultMessageResponse'
        '400':
          description: 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/nauth/auth/authentications/temp/passwd:
    post:
      tags:
        - nauth/auth
      summary: 임시 비밀번호 발급
      description: 아이디/이름/휴대폰 번호 확인 후 임시 비밀번호를 이메일로 발송
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TempPasswordRequest'
      responses:
        '200':
          description: 임시 비밀번호 발송 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultMessageResponse'
        '400':
          description: 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/nauth/system/installer:
    get:
      tags:
        - nauth/system
      summary: 키로깅 방지 에이전트 설치파일 정보 조회
      description: "테넌트의 userPtalKlpUseYn === true인 경우에만 호출"
      security: []
      responses:
        '200':
          description: 설치파일 정보 배열
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /v1/nauth/system/notices/public:
    get:
      tags:
        - nauth/system
      summary: 로그인 화면 공지사항 목록 조회
      description: 로그인 화면에 표시할 공지사항 목록
      security: []
      parameters:
        - name: noti_meth_cd
          in: query
          required: true
          schema:
            type: string
            enum:
              - U016REP
          description: "공지 방법 코드 (U016REP 고정)"
        - name: tnt_url_id
          in: query
          required: true
          schema:
            type: string
          description: 테넌트 URL ID
      responses:
        '200':
          description: 공지사항 배열
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicNotice'

  /v1/nauth/system/popup:
    get:
      tags:
        - nauth/system
      summary: 로그인 화면 팝업 메시지 조회
      description: 점검 중 안내 등 전체 공지 팝업
      security: []
      parameters:
        - name: tnt_url_id
          in: query
          required: true
          schema:
            type: string
          description: 테넌트 URL ID
      responses:
        '200':
          description: 팝업 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PopupMessage'

  /v1/nauth/system/portals/ui/{tntUrlId}/public:
    get:
      tags:
        - nauth/system
      summary: 로그인/메인 화면 UI 정보 조회
      description: 배경 이미지, 배너, 로고, 파비콘, 푸터 정보
      security: []
      parameters:
        - name: tntUrlId
          in: path
          required: true
          schema:
            type: string
          description: 테넌트 URL ID
      responses:
        '200':
          description: UI 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalUiPublic'

  /v1/nauth/system/{tntUrlId}/getToday:
    get:
      tags:
        - nauth/system
      summary: 서버 기준 현재 날짜/시간 조회
      description: 서버 기준 현재 날짜 및 시간
      security: []
      parameters:
        - name: tntUrlId
          in: path
          required: true
          schema:
            type: string
          description: 테넌트 URL ID
      responses:
        '200':
          description: 서버 날짜/시간
          content:
            application/json:
              schema:
                type: object
                properties:
                  today:
                    type: string
                    description: 서버 기준 현재 날짜 및 시간

  /v1/nauth/user/tenant/exist:
    get:
      tags:
        - nauth/user
      summary: 테넌트 존재 여부 확인
      description: 라우트 진입 시 테넌트 URL ID 유효성 검증 및 설정 반환
      security: []
      parameters:
        - name: tnt_url_id
          in: query
          required: true
          schema:
            type: string
          description: 테넌트 URL ID
      responses:
        '200':
          description: 테넌트 존재 여부 및 설정
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantExistResponse'

  /v1/nauth/user/tntMain:
    get:
      tags:
        - nauth/user
      summary: 기본(대표) 테넌트 조회
      description: "도메인만으로 접근 시 리다이렉트할 테넌트 확인. tnt_url_id가 null이면 404로 이동"
      security: []
      responses:
        '200':
          description: 기본 테넌트 정보
          content:
            application/json:
              schema:
                type: object
                properties:
                  tnt_url_id:
                    type: string
                    description: "기본 테넌트 URL ID (null이면 404로 이동)"

  /v1/nauth/user/auth/check:
    post:
      tags:
        - nauth/user
      summary: VPN 자동 로그인
      description: URL 쿼리스트링의 acct_conn_id와 onePassToken으로 인증 처리
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VpnLoginRequest'
      responses:
        '200':
          description: 인증 성공
          headers:
            Authorization:
              description: 인증 토큰
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VpnLoginResponse'
        '400':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/nauth/user/external/octatco/idcheck/{tntUrlId}:
    get:
      tags:
        - nauth/user
      summary: Octatco 아이디 존재 여부 확인
      description: 사용 가능한 2차 인증 수단 목록 조회
      security: []
      parameters:
        - name: tntUrlId
          in: path
          required: true
          schema:
            type: string
          description: 테넌트 URL ID
        - name: employeeId
          in: query
          required: true
          schema:
            type: string
          description: 사용자 아이디 (acct_conn_id)
      responses:
        '200':
          description: Octatco 아이디 확인 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OctatcoIdCheckResponse'

  /v1/nauth/user/external/octatco/reqToken/{tntUrlId}:
    post:
      tags:
        - nauth/user
      summary: Octatco 2차 인증 토큰 발송 요청
      description: "SMS/이메일/OTP 코드 발송, 모바일 생체인증 디바이스 목록 반환, PC 생체인증 FIDO 챌린지 반환"
      security: []
      parameters:
        - name: tntUrlId
          in: path
          required: true
          schema:
            type: string
          description: 테넌트 URL ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OctatcoReqTokenRequest'
      responses:
        '200':
          description: 인증 수단별 응답
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OctatcoReqTokenResponse'
        '400':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/nauth/user/external/octatco/userLogin/{tntUrlId}:
    post:
      tags:
        - nauth/user
      summary: Octatco 인증 검증 및 로그인 처리
      description: 인증 수단에 따라 코드/디바이스ID/FIDO 페이로드를 전달해 검증
      security: []
      parameters:
        - name: tntUrlId
          in: path
          required: true
          schema:
            type: string
          description: 테넌트 URL ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OctatcoUserLoginRequest'
      responses:
        '200':
          description: 인증 성공
          headers:
            Authorization:
              description: "인증 토큰 (SMS/EMAIL/OTP 성공 시)"
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OctatcoUserLoginResponse'
        '400':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/nauth/user/external/octatco/loginCheck/{tntUrlId}/{serial}:
    get:
      tags:
        - nauth/user
      summary: 모바일 생체인증 완료 후 최종 로그인 처리
      description: "MQTT를 통해 수신한 serial로 인증 결과 확인. 실제로는 POST로 호출됨"
      security: []
      parameters:
        - name: tntUrlId
          in: path
          required: true
          schema:
            type: string
          description: 테넌트 URL ID
        - name: serial
          in: path
          required: true
          schema:
            type: string
          description: MQTT 토픽으로 수신한 serial 값
      responses:
        '200':
          description: 로그인 성공
          headers:
            Authorization:
              description: 인증 토큰
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GwLoginResponse'
        '400':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/resource/disk/local/{acctId}:
    get:
      tags:
        - resource/disk
      summary: 개인 디스크 목록 및 사용 현황 조회
      description: 계정의 개인 디스크 목록과 사용 현황, 연결 가능한 Cloud PC 목록 반환
      parameters:
        - name: acctId
          in: path
          required: true
          schema:
            type: string
          description: 계정 ID
      responses:
        '200':
          description: 디스크 목록 및 사용 현황
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiskLocalResponse'

  /v1/resource/disk/local:
    post:
      tags:
        - resource/disk
      summary: 개인 디스크 신청
      description: 개인 디스크 추가 신청
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiskLocalCreateRequest'
      responses:
        '200':
          description: 신청 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/resource/disk/local/{dskId}:
    delete:
      tags:
        - resource/disk
      summary: 개인 디스크 삭제
      description: "개인 디스크 삭제. 삭제 후 복구 불가"
      parameters:
        - name: dskId
          in: path
          required: true
          schema:
            type: string
          description: 디스크 ID
      responses:
        '200':
          description: 삭제 성공

  /v1/resource/disk/local/attach:
    put:
      tags:
        - resource/disk
      summary: 개인 디스크를 Cloud PC에 연결
      description: 개인 디스크를 Cloud PC에 연결
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiskAttachRequest'
      responses:
