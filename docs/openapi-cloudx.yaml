openapi: 3.0.3
info:
  title: CloudX VDI Platform API
  description: CloudX VDI 플랫폼 API (admin-portal + user-portal)
  version: v2.2.10
servers:
  - url: http://127.0.0.1:3000/api
    description: Admin Mock Server
  - url: http://127.0.0.1:3001/api
    description: User Mock Server
security:
  - bearerAuth: []
paths:
  /v1/resource/vpcs/group:
    get:
      tags:
        - admin/resource/vpcs
      summary: VPC 그룹 목록 조회
      parameters:
        - name: page
          in: query
          schema:
            type: number
          description: 페이지 번호
        - name: limit
          in: query
          schema:
            type: number
          description: 페이지당 항목 수
        - name: vm_grp_nm
          in: query
          schema:
            type: string
          description: 그룹명 검색어
        - name: tnt_id
          in: query
          schema:
            type: string
          description: 테넌트 ID 필터
      responses:
        '200':
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VpcGroupListResponse'
    post:
      tags:
        - admin/resource/vpcs
      summary: VPC 그룹 등록
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VpcGroupCreateRequest'
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/group/{id}:
    get:
      tags:
        - admin/resource/vpcs
      summary: VPC 그룹 상세 조회
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: 그룹 ID
      responses:
        '200':
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VpcGroupDetailResponse'
  /v1/resource/vpcs/group/{vmGrpId}:
    put:
      tags:
        - admin/resource/vpcs
      summary: VPC 그룹 수정
      parameters:
        - name: vmGrpId
          in: path
          required: true
          schema:
            type: string
          description: 그룹 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VpcGroupUpdateRequest'
      responses:
        '200':
          description: 정상 처리
    delete:
      tags:
        - admin/resource/vpcs
      summary: VPC 그룹 삭제
      parameters:
        - name: vmGrpId
          in: path
          required: true
          schema:
            type: string
          description: 그룹 ID
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/group/{vmGrpId}/network:
    post:
      tags:
        - admin/resource/vpcs
      summary: VPC 그룹 네트워크 등록
      parameters:
        - name: vmGrpId
          in: path
          required: true
          schema:
            type: string
          description: 그룹 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VpcGroupNetworkCreateRequest'
      responses:
        '200':
          description: 정상 처리
    delete:
      tags:
        - admin/resource/vpcs
      summary: VPC 그룹 네트워크 삭제
      parameters:
        - name: vmGrpId
          in: path
          required: true
          schema:
            type: string
          description: 그룹 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VpcGroupNetworkDeleteRequest'
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/pool:
    get:
      tags:
        - admin/resource/vpcs
      summary: VPC 풀 목록 조회
      parameters:
        - name: vm_grp_id
          in: query
          schema:
            type: string
          description: 그룹 ID 필터
        - name: tnt_mtd_cd
          in: query
          schema:
            type: string
          description: 테넌트 방식 코드 (전용/공용 구분)
        - name: gdn_img_cre_yn
          in: query
          schema:
            type: string
          description: 골든이미지 생성 여부 (Y/N)
        - name: page
          in: query
          schema:
            type: number
          description: 페이지 번호
        - name: limit
          in: query
          schema:
            type: number
          description: 페이지당 항목 수
      responses:
        '200':
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VpcPoolListResponse'
    post:
      tags:
        - admin/resource/vpcs
      summary: VPC 풀 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VpcPoolCreateRequest'
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/pool/count:
    get:
      tags:
        - admin/resource/vpcs
      summary: VPC 풀 카운트 조회
      parameters:
        - name: vm_grp_id
          in: query
          schema:
            type: string
          description: 그룹 ID
      responses:
        '200':
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VpcPoolCountResponse'
  /v1/resource/vpcs/pool/auto/{companyNm}:
    get:
      tags:
        - admin/resource/tenants
      summary: 회사명 기준 자동 Pool 조회
      parameters:
        - name: companyNm
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 성공
  /v1/resource/vpcs/pool/{vmPoolId}:
    get:
      tags:
        - admin/resource/vpcs
      summary: VPC 풀 상세 조회
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      responses:
        '200':
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VpcPoolDetailResponse'
    put:
      tags:
        - admin/resource/vpcs
      summary: VPC 풀 수정
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VpcPoolUpdateRequest'
      responses:
        '200':
          description: 정상 처리
    delete:
      tags:
        - admin/resource/vpcs
      summary: VPC 풀 삭제
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/pool/{poolId}/subnet:
    post:
      tags:
        - admin/resource/vpcs
      summary: 풀 서브넷 등록(수정)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoolSubnetRequest'
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/pool/{vmPoolId}/subnet:
    put:
      tags:
        - admin/resource/vpcs
      summary: 풀 서브넷 수정
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoolSubnetRequest'
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/pool/{vmPoolId}/reset:
    put:
      tags:
        - admin/resource/vpcs
      summary: 풀 초기화
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/pool/{vmPoolId}/template:
    put:
      tags:
        - admin/resource/vpcs
      summary: 풀 템플릿 변경
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoolTemplateChangeRequest'
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/pool/{id}/image-mismatched-vm:
    get:
      tags:
        - admin/resource/vpcs
      summary: 이미지 불일치 VM 목록 조회
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      responses:
        '200':
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageMismatchedVmListResponse'
  /v1/resource/vpcs/pool/{vmPoolId}/volume:
    post:
      tags:
        - admin/resource/vpcs
      summary: 풀 볼륨 등록
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoolVolumeRequest'
      responses:
        '200':
          description: 정상 처리
    delete:
      tags:
        - admin/resource/vpcs
      summary: 풀 볼륨 해제
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
        - name: volm_typ_id
          in: query
          schema:
            type: string
          description: 볼륨 타입 ID
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/pool/{vmPoolId}/ip:
    get:
      tags:
        - admin/resource/vpcs
      summary: 풀 IP 목록 조회
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      responses:
        '200':
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolIpListResponse'
  /v1/resource/vpcs/pool/{vmPoolId}/collection:
    delete:
      tags:
        - admin/resource/vpcs
      summary: 자원 회수 (리소스 반납)
      parameters:
        - name: vmPoolId
          in: path
          required: true
          schema:
            type: string
          description: 풀 ID
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/pool2:
    get:
      tags:
        - admin/resource/vpcs
      summary: VPC 풀 목록 조회 (v2)
      parameters:
        - name: page
          in: query
          schema:
            type: number
          description: 페이지 번호
        - name: limit
          in: query
          schema:
            type: number
          description: 페이지당 항목 수
      responses:
        '200':
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VpcPoolListResponse'
  /v1/resource/vpcs/resources:
    get:
      tags:
        - user/resource/vpcs
      summary: VPC 목록 조회
      description: 현재 사용자에게 할당된 VPC 목록 반환
      responses:
        '200':
          description: VPC 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User_VpcResource'
  /v1/resource/vpcs/resources/list/vm2:
    get:
      tags:
        - admin/resource/vpcs
      summary: VPC 리소스 목록 조회 (v2, 그룹별)
      parameters:
        - name: page
          in: query
          schema:
            type: number
          description: 페이지 번호
        - name: limit
          in: query
          schema:
            type: number
          description: 페이지당 항목 수
        - name: vm_grp_id
          in: query
          schema:
            type: array
            items:
              type: string
          description: '그룹 ID (배열, arrayFormat: repeat)'
        - name: tnt_id
          in: query
          schema:
            type: string
          description: 테넌트 ID
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/resources/list/vm2/count:
    get:
      tags:
        - admin/resource/vpcs
      summary: VPC 리소스 카운트 조회
      parameters:
        - name: vm_grp_id
          in: query
          schema:
            type: string
          description: 그룹 ID
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/resources/vm_assign:
    post:
      tags:
        - admin/resource/vpcs
      summary: VM 유동 IP 개별 할당
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VmAssignRequest'
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/resources/vm_appoint_assign:
    post:
      tags:
        - admin/resource/vpcs
      summary: VM 고정 IP 개별 할당
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VmAppointAssignRequest'
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/resources/vm_bundle_assign:
    post:
      tags:
        - admin/resource/vpcs
      summary: VM 일괄 할당
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VmBundleAssignRequest'
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/resources/vm_scaleup:
    post:
      tags:
        - admin/resource/vpcs
      summary: VM 자원 증설 (사양 업그레이드)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VmScaleUpRequest'
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/resources/vm_scaleout:
    post:
      tags:
        - admin/resource/vpcs
      summary: VM 스케일아웃 (골든이미지 생성용 VM 생성)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VmScaleOutRequest'
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/resources/vm_bundle_secu_plcy:
    post:
      tags:
        - admin/resource/vpcs
      summary: VM 보안 정책 일괄 적용
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VmBundleSecuPlcyRequest'
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/resources/vnc_conn:
    post:
      tags:
        - admin/resource/vpcs
      summary: VNC 연결
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VncConnRequest'
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/resources/vnc_disconn:
    post:
      tags:
        - admin/resource/vpcs
      summary: VNC 연결 해제
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VncDisconnRequest'
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/resources/pooled/user_vm:
    get:
      tags:
        - admin/resource/vpcs
      summary: 공용 PC 대기 자원 목록 조회
      parameters:
        - name: vm_pool_id
          in: query
          schema:
            type: string
          description: 풀 ID 필터
        - name: page
          in: query
          schema:
            type: number
          description: 페이지 번호
        - name: limit
          in: query
          schema:
            type: number
          description: 페이지당 항목 수
      responses:
        '200':
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PooledUserVmListResponse'
  /v1/resource/vpcs/resources/pooled/usr_vm:
    delete:
      tags:
        - admin/resource/vpcs
      summary: 공용 PC 대기 자원 삭제
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PooledUserVmDeleteRequest'
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/resources/{id}:
    get:
      tags:
        - admin/resource/vpcs
      summary: VM 상세 조회
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: VM 인증 ID (vm_auth_id)
      responses:
        '200':
          description: 정상 처리
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VmDetailResponse'
  /v1/resource/vpcs/resources/{vmAuthId}:
    get:
      tags:
        - user/resource/vpcs
      summary: VPC 상세 정보 조회
      description: 특정 VPC의 상세 정보 반환 (스냅샷 복원 전 전원 상태 확인)
      parameters:
        - name: vmAuthId
          in: path
          required: true
          schema:
            type: string
          description: VM 인가 ID
      responses:
        '200':
          description: VPC 상세 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User_VpcResourceDetail'
  /v1/resource/vpcs/resources/{vmAuthId}/tenant:
    put:
      tags:
        - admin/resource/vpcs
      summary: VM 테넌트 정보 수정
      parameters:
        - name: vmAuthId
          in: path
          required: true
          schema:
            type: string
          description: VM 인증 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VmTenantUpdateRequest'
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/resources/{vmAuthId}/ip:
    put:
      tags:
        - admin/resource/vpcs
      summary: VM IP 변경
      parameters:
        - name: vmAuthId
          in: path
          required: true
          schema:
            type: string
          description: VM 인증 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VmIpChangeRequest'
      responses:
        '200':
          description: 정상 처리
  /v1/resource/vpcs/resources/{vmAuthId}/start:
    post:
      tags:
        - user/resource/vpcs
      summary: VPC 전원 ON
      description: VPC 전원 ON
      parameters:
        - name: vmAuthId
          in: path
          required: true
          schema:
            type: string
          description: VM 인가 ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: 전원 ON 성공
          content:
            application/json:
              schema:
                type: object
        '400':
          description: 전원 ON 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User_ErrorResponse'
  /v1/resource/vpcs/resources/{vmAuthId}/stop:
    post:
      tags:
        - user/resource/vpcs
      summary: VPC 전원 OFF
      description: VPC 전원 OFF
      parameters:
        - name: vmAuthId
          in: path
          required: true
          schema:
            type: string
          description: VM 인가 ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: 전원 OFF 성공
          content:
            application/json:
              schema:
                type: object
  /v1/resource/vpcs/resources/{vmAuthId}/restart:
    post:
      tags:
        - user/resource/vpcs
      summary: VPC 재시작
      description: VPC 재시작
      parameters:
        - name: vmAuthId
          in: path
          required: true
          schema:
            type: string
          description: VM 인가 ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: 재시작 성공
          content:
            application/json:
              schema:
                type: object
  /v1/resource/vpcs/resources/{vmAuthId}/recovery:
    post:
      tags:
        - user/resource/vpcs
      summary: Self-failover 오류 복구 (정적 IP용)
      description: 정적 IP 할당 VM용. 전원이 켜진 상태에서 강제 종료 후 복구하거나, 꺼진 상태에서 바로 복구
      parameters:
        - name: vmAuthId
          in: path
          required: true
          schema:
            type: string
          description: VM 인가 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_workset_yn
              properties:
                user_workset_yn:
                  type: string
                  description: 사용자 워크셋 여부. 항상 "Y"
      responses:
